name: "Zimperium zScan"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zscan:
    name: zScan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Android Gradle wrapper files exist
        run: |
          test -f android/gradlew
          test -f android/gradle/wrapper/gradle-wrapper.properties
          test -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        with:
          wrapper-directory: android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Execute gradle build
        working-directory: android
        run: ./gradlew --no-daemon build

      - name: Run Zimperium zScan
        uses: zimperium/zscanmarketplace@bfc6670f6648d796098c251ccefcfdb98983174d
        timeout-minutes: 60
        with:
          client_env: ${{ vars.ZSCAN_CLIENT_ENV }}
          client_id: ${{ vars.ZSCAN_CLIENT_ID }}
          client_secret: ${{ secrets.ZSCAN_CLIENT_SECRET }}
          app_file: app-release-unsigned.apk

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: Zimperium.sarif
