name: Android SDLC Automation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  frontend-quality:
    name: Frontend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web bundle
        run: npm run build

      - name: Run tests (if available)
        shell: bash
        run: |
          if npm run | grep -qE '^\s+test'; then
            npm test -- --runInBand
          else
            echo "No test script found in package.json; skipping"
          fi

  android-bridge-check:
    name: Android bridge integrity checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate expected Android bridge files
        run: |
          test -f android/app/src/main/java/com/ampereeye/core/BatteryTruthPlugin.kt
          test -f android/app/src/main/cpp/native-lib.cpp
          test -f capacitor.config.ts

      - name: Validate Capacitor sync
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Android assets
        run: npm run android:sync

  android-build:
    name: Android compile, lint, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - frontend-quality
      - android-bridge-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Android assets
        run: npm run android:sync

      - name: Detect Gradle wrapper
        id: wrapper
        shell: bash
        run: |
          if [[ -f android/gradlew ]] \
            && [[ -f android/gradle/wrapper/gradle-wrapper.jar ]] \
            && [[ -f android/gradle/wrapper/gradle-wrapper.properties ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Android Gradle wrapper is missing. Commit a complete android project (including gradle wrapper files) to enable full Android compile/lint/test automation."
          fi

      - name: Set up Gradle cache
        if: steps.wrapper.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        if: steps.wrapper.outputs.present == 'true'
        uses: gradle/actions/wrapper-validation@v4
        with:
          wrapper-directory: android

      - name: Grant execute permission for gradlew
        if: steps.wrapper.outputs.present == 'true'
        run: chmod +x android/gradlew

      - name: Compile + lint + unit tests
        if: steps.wrapper.outputs.present == 'true'
        working-directory: android
        run: |
          ./gradlew --no-daemon clean :app:assembleDebug :app:lint :app:testDebugUnitTest

      - name: Upload Android artifacts
        if: steps.wrapper.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-outputs
          path: |
            android/app/build/reports/**
            android/app/build/outputs/**
          if-no-files-found: warn
